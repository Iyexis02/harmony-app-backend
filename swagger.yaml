        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Onboarding]
      summary: Get lifestyle (deprecated)
      description: '**Deprecated.** Use `GET /api/v1/onboarding/profile` instead. Sunset: 2026-06-11.'
      operationId: getLifestyle
      deprecated: true
      responses:
        '200':
          description: Lifestyle data
          headers:
            Sunset:
              schema:
                type: string
