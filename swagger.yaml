          type: number
          format: double
          description: 0–100
          example: 78.4
        musicScore:
          type: number
          format: double
          description: 0–100
          example: 85.0
        lifestyleScore:
          type: number
          format: double
          description: 0–100
          example: 72.0
        interestsScore:
          type: number
          format: double
          description: 0–100
          example: 65.0
