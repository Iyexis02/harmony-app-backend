        '200':
          description: Music preferences
          headers:
            Sunset:
              schema:
                type: string
              example: Thu, 11 Jun 2026 00:00:00 GMT
            Deprecation:
              schema:
                type: string
              example: 'true'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MusicPreferencesResponse'
