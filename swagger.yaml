          type: number
          format: double
          description: Requesting user's weight for this genre (0–1)
          example: 0.85
        otherWeight:
          type: number
          format: double
          description: Other user's weight for this genre (0–1)
          example: 0.72
        overlap:
          type: number
          format: double
          description: min(userWeight, otherWeight)
          example: 0.72
        similarity:
          type: number
          format: double
          description: 1.0 = identical weights, 0.0 = very different
          example: 0.85

